[pytest]
testpaths = layer0/tests layer1/tests layer2/tests layer3/tests layer4/tests layer5/tests layer6/tests runtime/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# Add scafad/ (.) and repo root (..) to sys.path so bare imports resolve
# regardless of how pytest is invoked (DL-041).
pythonpath = . ..
