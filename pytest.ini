[pytest]
addopts = --strict-markers --strict-config -ra --verbose --import-mode=importlib
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
# Expose repo root and scafad/ package dir so that both `scafad.*` absolute
# imports and the intra-package bare imports (e.g. `from layer0.telemetry`)
# used inside scafad/runtime/ resolve correctly (DL-039).
pythonpath = . scafad
markers =
    asyncio: marks tests that require an 